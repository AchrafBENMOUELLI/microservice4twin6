spring.application.name=eventproject
spring.datasource.url=jdbc:mysql://localhost:3306/events_db?createDatabaseIfNotExist=true&useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# --- JPA settings ---
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
server.port=8088
#eureka
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Spring RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# CONFIG SERVER
spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:8888


welcome.message= Welcome to event ms
management.endpoints.web.exposure.include=*

# Keycloak
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/Eventy_Realm
