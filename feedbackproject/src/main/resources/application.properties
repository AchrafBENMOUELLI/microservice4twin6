spring.application.name=feedbackproject

spring.datasource.url=jdbc:mysql://localhost:3306/feedbackdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8090

#spring.config.import=optional:configserver:

# Eureka
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Spring RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# CONFIG SERVER
spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:8888

welcome.message= Welcome to feedback ms

management.endpoints.web.exposure.include=*


#keyclaok
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Keycloak JWT issuer
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/Eventy_Realm
